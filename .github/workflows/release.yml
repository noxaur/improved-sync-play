name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Integration smoke
        run: cd tests/integration && ./smoke.sh

  release:
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Stage plugin
        run: ./scripts/stage-plugin.sh

      - name: Package zip
        run: |
          VERSION="$(python3 -c "import json; print(json.load(open('Jellyfin.Plugin.ImprovedSyncPlay/meta.json'))['version'])")"
          PLUGIN_NAME="$(python3 -c "import json; print(json.load(open('Jellyfin.Plugin.ImprovedSyncPlay/meta.json'))['name'])")"
          cd "artifacts/plugin/$PLUGIN_NAME"
          ZIP_NAME="Improved-SyncPlay-${VERSION}.zip"
          zip -r "../../../${ZIP_NAME}" .
          cd ../../..
          ./scripts/update-manifest.sh "${ZIP_NAME}" "${GITHUB_REF_NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Improved-SyncPlay-*.zip
            manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
