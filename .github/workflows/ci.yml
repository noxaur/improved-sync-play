name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Validate catalog
        run: ./scripts/validate-catalog.sh

      - name: Validate catalog fixtures
        run: ./scripts/validate-catalog.sh --self-check

      - name: Check AGENTS catalog index
        run: ./scripts/regenerate-agents-index.sh --check

  integration-smoke:
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Integration smoke
        run: cd tests/integration && ./smoke.sh
