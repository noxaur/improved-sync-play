services:
  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_IMAGE_TAG:-10.11.11}
    container_name: jellyfin-plugin-template-dev
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    environment:
      - JELLYFIN_PublishedServerUrl=http://localhost:${JELLYFIN_PORT:-8096}
    volumes:
      - ${JELLYFIN_CONFIG}:/config
      - ${JELLYFIN_CACHE}:/cache
      - ${PLUGIN_STAGE}:/config/plugins/${PLUGIN_NAME:-Template}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8096/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
