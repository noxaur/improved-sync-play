stages:
  - build
  - integration

variables:
  DOTNET_VERSION: "9.0"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build -c Release
    - dotnet test -c Release
    - ./scripts/validate-catalog.sh
    - ./scripts/validate-catalog.sh --self-check
    - ./scripts/regenerate-agents-index.sh --check
    - ./scripts/stage-plugin.sh
  artifacts:
    paths:
      - artifacts/plugin/

integration-smoke:
  stage: integration
  image: mcr.microsoft.com/dotnet/sdk:9.0
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    STAGE_SKIP_BUILD: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl python3 docker.io
  script:
    - cd tests/integration && ./smoke.sh
  needs:
    - build
